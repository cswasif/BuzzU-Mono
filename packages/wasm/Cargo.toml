[package]
name = "buzzu-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2.105"
aes-gcm = "0.10"
chacha20poly1305 = "0.10"
sha2 = "0.10"
rand = "0.8"
base64 = "0.21"
getrandom = { version = "0.2", features = ["js"] }
zeroize = { version = "1", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
console_error_panic_hook = "0.1"
lz4_flex = { version = "0.12", default-features = false }
js-sys = "0.3"
x25519-dalek = { version = "2.0", features = ["reusable_secrets", "static_secrets"] }
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
curve25519-dalek = "4.1"
hkdf = "0.12"
subtle = "2.5"
serde-wasm-bindgen = "0.6"
image = { version = "0.24", default-features = false, features = ["webp", "jpeg", "png"] }

[dependencies.web-sys]
version = "0.3"
features = [
  "console",
  "WebSocket",
  "MessageEvent",
  "CloseEvent",
  "ErrorEvent",
  "Event",
  "Blob",
  "FileReader",
]

[profile.release]
opt-level = "s"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false