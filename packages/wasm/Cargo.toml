[package]
name = "buzzu-wasm"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2.105"
aes-gcm = "0.10"
sha2 = "0.10"
rand = "0.8"
base64 = "0.21"
getrandom = { version = "0.2", features = ["js"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
console_error_panic_hook = "0.1"
lz4_flex = { version = "0.12", default-features = false }
js-sys = "0.3"

[dependencies.web-sys]
version = "0.3"
features = [
  "console",
  "WebSocket",
  "MessageEvent",
  "CloseEvent",
  "ErrorEvent",
  "Event",
  "Blob",
  "FileReader",
]

[profile.release]
opt-level = "s"