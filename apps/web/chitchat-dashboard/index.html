<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>BuzzU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
          },
          colors: {
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary: 'hsl(var(--primary))',
            'primary-foreground': 'hsl(var(--primary-foreground))',
            secondary: 'hsl(var(--secondary))',
            'secondary-foreground': 'hsl(var(--secondary-foreground))',
            popover: 'hsl(var(--popover))',
            'popover-foreground': 'hsl(var(--popover-foreground))',
            card: 'hsl(var(--card))',
            'card-foreground': 'hsl(var(--card-foreground))',
            panel: 'hsl(var(--panel))',
            'panel-foreground': 'hsl(var(--panel-foreground))',
            muted: 'hsl(var(--muted))',
            'muted-foreground': 'hsl(var(--muted-foreground))',
            accent: 'hsl(var(--accent))',
            'accent-foreground': 'hsl(var(--accent-foreground))',
            action: 'hsl(var(--action))',
            overlay: 'hsl(var(--overlay))',
            destructive: 'hsl(var(--destructive))',
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            field: 'hsl(var(--field))',
            ring: 'hsl(var(--ring))',
            warning: 'hsl(var(--warning))',
            success: 'hsl(var(--success))',
            brightness: 'hsl(var(--brightness))',
            'brightness-foreground': 'hsl(var(--brightness-foreground))',
            placeholder: 'hsl(var(--placeholder))',
            'placeholder-foreground': 'hsl(var(--placeholder-foreground))',
          },
          borderRadius: {
            DEFAULT: 'var(--radius)',
            lg: 'var(--radius)',
            md: 'calc(var(--radius) - 2px)',
            sm: 'calc(var(--radius) - 4px)',
          },
          width: {
            '62': '15.4rem',
          },
        },
      },
    }
  </script>
  <style>
    :root {
      --radius: 0.5rem;
      --brightness: 0 0% 0%;
      --brightness-foreground: 0 0% 100%;
      --placeholder: 230 10% 84%;
      --placeholder-foreground: 264 3.9% 30%;
      --background: 234 10% 95%;
      --foreground: 235 10% 20%;
      --popover: 232 10% 89%;
      --panel: 230 10% 85%;
      --panel-foreground: 235 10% 20%;
      --card: 230 10% 90%;
      --card-foreground: 235 10% 20%;
      --primary: 255 42% 50%;
      --primary-foreground: 210 40% 98%;
      --secondary: 240 4.8% 95.9%;
      --secondary-foreground: 240 5.9% 10%;
      --muted: 240 10% 82%;
      --muted-foreground: 235 5% 35%;
      --accent: 0 0% 96.1%;
      --accent-foreground: 0 0% 9%;
      --action: 240 10% 93%;
      --overlay: 234 10% 3.5%;
      --destructive: 0 62.8% 50%;
      --warning: 24 100% 61%;
      --success: 116 46% 49%;
      --border: 220 8% 70%;
      --input: 264 19.5% 88.3%;
      --field: 240 10% 92%;
      --ring: 0 0% 3.9%;
    }

    .dark {
      --brightness: 255 100% 100%;
      --placeholder: 233 6% 26.5%;
      --placeholder-foreground: 264 3.9% 96.95%;
      --background: 234 10% 20%;
      --foreground: 235 10% 80%;
      --popover: 232 10% 16%;
      --panel: 230 10% 12%;
      --panel-foreground: 235 10% 80%;
      --card: 235 10% 15%;
      --card-foreground: 235 10% 80%;
      --muted: 240 10% 10%;
      --muted-foreground: 235 5% 65%;
      --action: 240 10% 7%;
      --overlay: 234 10% 3.5%;
      --destructive: 0 62.8% 50%;
      --border: 220 8% 30%;
      --input: 264 19.5% 11.7%;
      --field: 240 10% 15%;
      --primary: 255 42% 50%;
      --primary-foreground: 249 100% 88%;
      --secondary: 264 10% 11%;
      --secondary-foreground: 264 5% 80%;
      --accent: 233 6% 24%;
      --accent-foreground: 264 3.9% 96.95%;
      --warning: 24 100% 39%;
      --success: 116 46% 49%;
      --ring: 264 39% 39%;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: 'DM Sans', sans-serif;
    }

    /* Custom scrollbar handling similar to scroll-area-viewport */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: transparent;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    [data-radix-scroll-area-viewport] {
      scrollbar-width: none;
      -ms-overflow-style: none;
      -webkit-overflow-scrolling: touch;
    }

    [data-radix-scroll-area-viewport]::-webkit-scrollbar {
      display: none;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root" class="h-full w-full"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
